name: 构建 sub-web 镜像（安全版）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 3,6'
  push:
    paths:
      - 'src/views/Subconverter.vue'

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  TG_BOT_TOKEN: "${{ secrets.TG_BOT_TOKEN }}"
  TG_CHAT_ID: "${{ secrets.TG_CHAT_ID }}"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v2

    - name: 安装 jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: 设置 Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: 构建 Docker 镜像
      id: build-image
      run: |
        TODAY_TAG=$(date +'%m%d')
        IMAGE_NAME=subweb:$TODAY_TAG
        docker build --platform linux/amd64 -t $IMAGE_NAME .
        docker images

    - name: 保存 Docker 镜像为 tar 包
      run: |
        TODAY_TAG=$(date +'%m%d')
        docker save subweb:$TODAY_TAG -o subweb_$TODAY_TAG.tar
        ls -lh subweb_$TODAY_TAG.tar

    - name: 登录阿里云容器镜像服务
      run: |
        echo "${{ env.ALIYUN_REGISTRY_PASSWORD }}" | docker login $ALIYUN_REGISTRY -u $ALIYUN_REGISTRY_USER --password-stdin

    - name: 推送镜像到阿里云（安全版 & Latest）
      id: push-image
      run: |
        set -e
        TODAY_TAG=$(date +'%m%d')
        IMAGE_NAME=subweb:$TODAY_TAG
        
        # 定义两个目标镜像地址
        ALIYUN_IMAGE_DATE=$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/subweb:$TODAY_TAG
        ALIYUN_IMAGE_LATEST=$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/subweb:latest
        
        # 打双标签
        docker tag $IMAGE_NAME $ALIYUN_IMAGE_DATE
        docker tag $IMAGE_NAME $ALIYUN_IMAGE_LATEST

        # 初始化状态为失败
        echo "PUSH_RESULT=failure" >> $GITHUB_ENV
        
        # 先推送日期标签，成功后推送 Latest 标签
        if docker push $ALIYUN_IMAGE_DATE; then
          if docker push $ALIYUN_IMAGE_LATEST; then
            echo "PUSH_RESULT=success" >> $GITHUB_ENV
          fi
        fi
        
        # 清理本地镜像 (包含 latest)
        docker rmi $ALIYUN_IMAGE_DATE $ALIYUN_IMAGE_LATEST $IMAGE_NAME || true

        # ===== 安全删除旧镜像，只保留最近10个 (排除Latest) =====
        REPO=$ALIYUN_NAME_SPACE/subweb
        TAGS_JSON=$(curl -s -u "$ALIYUN_REGISTRY_USER:$ALIYUN_REGISTRY_PASSWORD" \
          "https://$ALIYUN_REGISTRY/v2/$REPO/tags/list")

        # 使用 jq 过滤掉 "latest" 标签，并处理空值情况
        TAGS=$(echo "$TAGS_JSON" | jq -r '.tags // [] | map(select(. != "latest")) | sort | reverse')

        COUNT=0
        for TAG in $TAGS; do
          # 过滤掉 jq 输出的括号等无效字符
          [[ "$TAG" == "[" || "$TAG" == "]" || -z "$TAG" ]] && continue
          
          COUNT=$((COUNT+1))
          if [ $COUNT -gt 10 ]; then
            echo "删除旧镜像: $ALIYUN_REGISTRY/$REPO:$TAG"
            curl -s -X DELETE -u "$ALIYUN_REGISTRY_USER:$ALIYUN_REGISTRY_PASSWORD" \
              "https://$ALIYUN_REGISTRY/v2/$REPO/manifests/$TAG" || true
          fi
        done

    - name: 发送 Telegram 通知
      if: always()
      run: |
        TODAY_TAG=$(date +'%m%d')
        DISPLAY_NAME="subweb:$TODAY_TAG (及 latest)"
        FULL_IMAGE_PATH_DATE="${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAME_SPACE }}/subweb:$TODAY_TAG"
        FULL_IMAGE_PATH_LATEST="${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAME_SPACE }}/subweb:latest"
        BUILD_TIME=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")

        MSG="📦 *镜像构建通知*\n\n"
        MSG+="*镜像名称*: \`$DISPLAY_NAME\`\n"
        MSG+="*构建时间*: \`$BUILD_TIME\`\n"

        if [ "${{ env.PUSH_RESULT }}" == "success" ]; then
          STATUS="阿里云 ✅"
          MSG+="*推送状态*: $STATUS\n"
          MSG+="*镜像地址*:\n"
          MSG+="- 日期版: \`$FULL_IMAGE_PATH_DATE\`\n"
          MSG+="- 最新版: \`$FULL_IMAGE_PATH_LATEST\`"
        else
          STATUS="阿里云 ❌"
          MSG+="*推送状态*: $STATUS"
        fi

        curl -s -X POST "https://api.telegram.org/bot${{ env.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ env.TG_CHAT_ID }}" \
          -d parse_mode="Markdown" \
          --data-urlencode "text=$(printf '%b' "${MSG}")"

    - name: 删除旧的 Workflow 运行记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.REPO_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 0

    - name: 删除自动发布的旧固件
      uses: shidahuilang/delete-older-releases@main
      with:
        keep_latest: 1
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}